<section id="radio" class="content-section">
  <div class="container">
    <h1>🎵 Lebanese Radio Stations</h1>
    <p>Immerse yourself in Lebanese culture with authentic radio content</p>

    <div class="radio-controls">
      <div class="genre-filter">
        <button class="filter-btn active" data-genre="all">All Genres</button>
        <button class="filter-btn" data-genre="arabic">Arabic Music</button>
        <button class="filter-btn" data-genre="news">News & Talk</button>
        <button class="filter-btn" data-genre="pop">International Pop</button>
      </div>
    </div>

    <div class="radio-stations" id="radioStations">
      <!-- Radio stations will be populated -->
    </div>

    <div class="listening-practice">
      <div class="card">
        <div class="card__body">
          <h3>🎯 Radio Listening Challenge</h3>
          <p>Listen to Lebanese radio and identify these key phrases:</p>
          <div class="practice-phrases" id="radioPractice">
            <!-- Practice phrases will be populated -->
          </div>
          <button class="btn btn--primary" id="startRadioChallenge">Start Challenge</button>
        </div>
      </div>
    </div>
  </div>
</section>
