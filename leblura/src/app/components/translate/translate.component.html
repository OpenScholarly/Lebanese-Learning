<section id="translate" class="content-section">
  <div class="container">
    <h1>🌐 Real-Time Translation</h1>
    <p>Translate between English/French and Lebanese Arabic with pronunciation</p>

    <div class="translation-container">
      <div class="translation-modes">
        <button class="mode-btn" [attr.data-mode]="mode.name" [class.active]="mode.name === activeMode" (click)="changeMode(mode.name)" *ngFor="let mode of translationModes">
          {{ mode.fullName }}
        </button>
      </div>

      <div class="translation-inputs">
        <div class="input-section">
          <label class="form-label">From:</label>
          <select id="fromLang" class="form-control">
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="ar">Arabic</option>
          </select>
          <textarea id="inputText" class="form-control" rows="4" placeholder="Enter text to translate..."></textarea>
        </div>

        <div class="translation-arrow">
          <button class="swap-btn" id="swapLanguages">⇄</button>
        </div>

        <div class="input-section">
          <label class="form-label">To: Lebanese Arabic</label>
          <div class="output-container">
            <div id="arabicOutput" class="arabic-output">Translation will appear here...</div>
            <div id="pronunciationOutput" class="pronunciation-output"></div>
            <div class="translation-controls">
              <button class="btn btn--sm audio-btn" id="playTranslation">🔊 Play</button>
              <button class="btn btn--sm btn--outline" id="saveTranslation">💾 Save</button>
              <button class="btn btn--sm btn--outline" id="shareTranslation">📤 Share</button>
            </div>
          </div>
        </div>
      </div>

      <div class="translation-actions">
        <button class="btn btn--primary btn--full-width" id="translateBtn">Translate</button>
        <div class="translation-status" id="translationStatus"></div>
      </div>
    </div>

    <div class="common-phrases">
      <h3>Common Lebanese Phrases</h3>
      <div class="phrase-categories">
        <button class="phrase-tab" [attr.data-category]="category.name" *ngFor="let category of phrasesCategories"
            (click)="changeCategory(category.name)" [class.active]="category.name === activeCategory">
          {{ category.name }}
        </button>
      </div>
      <div class="phrase-grid" id="phraseGrid">
        <p *ngFor="let phrase of activePhrases"
            class="phrase" (click)="selectPhrase(phrase)">
          {{ phrase.text }} <span class="phrase-pronunciation">({{ phrase.pronunciation }})</span>
      </div>
    </div>

    <div class="translation-history">
      <h3>Translation History</h3>
      <div id="translationHistory" class="history-list">
        <!-- Translation history will appear here -->
      </div>
    </div>
  </div>
</section>
