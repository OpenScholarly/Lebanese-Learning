<section id="vocabulary" class="content-section">
  <div class="container">
    <div class="vocabulary-header">
      <h1>Enhanced Vocabulary Learning</h1>
      <p>Master 130+ authentic Lebanese Arabic words across 7 comprehensive categories</p>

      <div class="vocabulary-controls">
        <div class="search-filter">
          <input type="text" id="vocabularySearch" placeholder="Search vocabulary..." class="form-control">
          <select id="difficultyFilter" class="form-control">
            <option value="all">All Levels</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
      </div>
    </div>

    <div class="category-overview" id="categoryOverview">
      <!-- Categories will be populated by JavaScript -->
    </div>

    <div class="active-learning">
      <div class="flashcard-section">
        <div class="flashcard-controls-top">
          <div class="category-selector" id="categorySelector">
            <!-- Category tabs will be populated -->
          </div>
          <div class="learning-mode">
            <select id="learningMode" class="form-control">
              <option value="flashcard">Flashcard Mode</option>
              <option value="quiz">Quiz Mode</option>
              <option value="listening">Listening Mode</option>
            </select>
          </div>
        </div>

        <div class="flashcard-container" id="flashcardContainer">
          <div class="flashcard enhanced-card" id="flashcard">
            <div class="flashcard-front">
              <div class="card-category" id="cardCategory">Greetings & Basic Phrases</div>
              <div class="arabic-text" id="arabicText">أهلاً وسهلاً</div>
              <div class="pronunciation" id="pronunciation">ahlan wa sahlan</div>
              <div class="usage-note" id="usageNote">Formal greeting</div>
              <div class="card-actions">
                <button class="btn btn--sm audio-btn" id="playAudio">🔊 Play</button>
                <button class="btn btn--sm btn--outline" id="slowAudio">🐌 Slow</button>
              </div>
            </div>
            <div class="flashcard-back">
              <div class="translations">
                <div class="english-translation">
                  <strong>English:</strong> <span id="englishText">hello/welcome</span>
                </div>
                <div class="french-translation">
                  <strong>Français:</strong> <span id="frenchText">bonjour/bienvenue</span>
                </div>
              </div>
              <div class="example-sentence" id="exampleSentence">
                <!-- Example usage will be shown here -->
              </div>
              <div class="mastery-actions">
                <button class="btn btn--sm mastery-btn easy" id="markEasy">😊 Easy</button>
                <button class="btn btn--sm mastery-btn medium" id="markMedium">😐 Medium</button>
                <button class="btn btn--sm mastery-btn hard" id="markHard">😰 Hard</button>
              </div>
            </div>
          </div>
        </div>

        <div class="flashcard-navigation">
          <button class="btn btn--outline nav-btn" id="prevCard">← Previous</button>
          <div class="card-info">
            <span class="card-counter">
              <span id="currentCard">1</span> / <span id="totalCards">130</span>
            </span>
            <button class="btn btn--primary" id="flipCard">Flip Card</button>
          </div>
          <button class="btn btn--outline nav-btn" id="nextCard">Next →</button>
        </div>
      </div>
    </div>
  </div>
</section>
